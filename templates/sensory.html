{% extends "base.html" %}

{% block title %}감각으로 찾기 - MoonBBang Station{% endblock %}

{% block content %}
<div class="sensory-layout">
    <!-- 좌측: 소갯말 -->
    <div class="sensory-left">
        <div class="intro-welcome">
            <img src="/static/hero-alien.svg" alt="빵을 든 우주 여행자" class="intro-welcome-icon">
            <p class="intro-welcome-title">"내 안의<br>빵 레이더 켜기"</p>
            <div class="intro-welcome-body">
                <p>말로 설명하기 귀찮을 땐,<br>본능이 이끄는 대로 골라보세요!</p>
                <p>세 가지 질문에 답하면<br>당신의 감각이 빵집을 찾아줍니다.</p>
            </div>
        </div>
    </div>

    <!-- 우측: 감각 폼 -->
    <div class="sensory-right">
        <section class="sensory-form">
            <h2>오늘의 빵, 감각으로 찾기</h2>
            <form action="/sensory" method="post">
                <fieldset class="sensory-question">
                    <legend><img src="/static/icons/bread.svg" alt="" class="legend-icon">1. 끌리는 식감
                    </legend>
                    <label class="sensory-option">
                        <input type="radio" name="texture" value="바삭" checked>
                        <span class="sensory-check"></span>
                        <span class="sensory-label">바삭바삭</span>
                        <span class="sensory-desc">경쾌한 소리의 크루아상 & 페이스트리</span>
                    </label>
                    <label class="sensory-option">
                        <input type="radio" name="texture" value="부드러움">
                        <span class="sensory-check"></span>
                        <span class="sensory-label">폭신폭신</span>
                        <span class="sensory-desc">구름처럼 부드러운 식빵 & 케이크</span>
                    </label>
                </fieldset>

                <fieldset class="sensory-question">
                    <legend><img src="/static/icons/sparkle.svg" alt="" class="legend-icon">2. 지금 끌리는 맛</legend>
                    <label class="sensory-option">
                        <input type="radio" name="taste" value="달콤" checked>
                        <span class="sensory-check"></span>
                        <span class="sensory-label">풀 충전 달콤</span>
                        <span class="sensory-desc">한입에 행복해지는 단맛 가득</span>
                    </label>
                    <label class="sensory-option">
                        <input type="radio" name="taste" value="고소">
                        <span class="sensory-check"></span>
                        <span class="sensory-label">은은한 고소함</span>
                        <span class="sensory-desc">씹을수록 깊어지는 곡물의 풍미</span>
                    </label>
                </fieldset>

                <fieldset class="sensory-question">
                    <legend><img src="/static/icons/astronaut.svg" alt="" class="legend-icon">3. 누구와 함께
                    </legend>
                    <label class="sensory-option">
                        <input type="radio" name="atmosphere" value="혼자" checked>
                        <span class="sensory-check"></span>
                        <span class="sensory-label">혼자만의 여유</span>
                        <span class="sensory-desc">조용히 집중하기 좋은 곳</span>
                    </label>
                    <label class="sensory-option">
                        <input type="radio" name="atmosphere" value="여럿">
                        <span class="sensory-check"></span>
                        <span class="sensory-label">즐거운 수다</span>
                        <span class="sensory-desc">동료, 친구, 연인과 함께 가기 좋은 곳</span>
                    </label>
                </fieldset>

                <button type="submit"><img src="/static/icons/rocket.svg" alt="" class="btn-icon">취향 저격 빵집 찾기</button>
            </form>
            <a href="/" class="back-link"> <img src="/static/icons/sun.svg" alt="" class="btn-icon">세부 옵션으로 고르기</a>
        </section>
    </div>
</div>
{% endblock %}
