<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <!-- === stars background === -->
  <circle cx="20" cy="20" r="2" fill="#FBBD40"/>
  <circle cx="175" cy="15" r="2.5" fill="#FBBD40"/>
  <circle cx="45" cy="55" r="1.5" fill="#FBBD40"/>
  <circle cx="160" cy="60" r="1.8" fill="#FBBD40"/>
  <circle cx="10" cy="100" r="1.5" fill="#FBBD40"/>
  <circle cx="190" cy="105" r="2" fill="#FBBD40"/>
  <!-- sparkle left -->
  <path d="M30 40l1.5-4 1.5 4 4 1.5-4 1.5-1.5 4-1.5-4-4-1.5z" fill="#FBBD40" stroke="#3A1F54" stroke-width="1"/>
  <!-- sparkle right -->
  <path d="M170 45l1-3 1 3 3 1-3 1-1 3-1-3-3-1z" fill="#FBBD40" stroke="#3A1F54" stroke-width="0.8"/>

  <!-- === alien body === -->
  <!-- body / suit -->
  <path d="M72 145c0-10 10-20 28-20s28 10 28 20v25c0 4-3 7-7 7H79c-4 0-7-3-7-7z" fill="#FBBD40" stroke="#3A1F54" stroke-width="3" stroke-linejoin="round"/>
  <!-- belt -->
  <rect x="78" y="155" width="44" height="6" rx="3" fill="#3A1F54"/>
  <circle cx="100" cy="158" r="3.5" fill="#FBBD40" stroke="#3A1F54" stroke-width="1.5"/>

  <!-- === helmet === -->
  <circle cx="100" cy="100" r="35" fill="#FBBD40" stroke="#3A1F54" stroke-width="3"/>
  <!-- visor -->
  <circle cx="100" cy="98" r="25" fill="#FFFDF9" stroke="#3A1F54" stroke-width="2.5"/>
  <!-- visor shine -->
  <path d="M82 86a22 22 0 0 1 12-8" stroke="#FBBD40" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- face -->
  <circle cx="90" cy="95" r="3.5" fill="#3A1F54"/>
  <circle cx="110" cy="95" r="3.5" fill="#3A1F54"/>
  <!-- eye shine -->
  <circle cx="91.5" cy="93.5" r="1.2" fill="#FFFDF9"/>
  <circle cx="111.5" cy="93.5" r="1.2" fill="#FFFDF9"/>
  <!-- blush -->
  <ellipse cx="84" cy="104" rx="4" ry="2.5" fill="#F5A623" opacity="0.35"/>
  <ellipse cx="116" cy="104" rx="4" ry="2.5" fill="#F5A623" opacity="0.35"/>
  <!-- mouth - happy -->
  <path d="M93 107q7 6 14 0" stroke="#3A1F54" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- antenna -->
  <line x1="100" y1="65" x2="100" y2="50" stroke="#3A1F54" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="46" r="5" fill="#FBBD40" stroke="#3A1F54" stroke-width="2.5"/>
  <!-- antenna glow -->
  <circle cx="100" cy="46" r="2" fill="#FFFDF9" opacity="0.5"/>

  <!-- === left arm holding bread === -->
  <path d="M72 150c-8-2-18-5-22-2s-2 10 2 12" stroke="#3A1F54" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- hand -->
  <circle cx="50" cy="158" r="5" fill="#FBBD40" stroke="#3A1F54" stroke-width="2.5"/>

  <!-- === bread (held in left hand) === -->
  <g transform="translate(28, 135) rotate(-15)">
    <!-- bread body -->
    <path d="M5 18c0-8 4-14 13-14s13 6 13 14c0 3-1.5 5.5-2.5 5.5H7.5c-1 0-2.5-2.5-2.5-5.5z" fill="#FBBD40" stroke="#3A1F54" stroke-width="2.2" stroke-linejoin="round"/>
    <!-- score lines -->
    <path d="M12 6c-.4 3.5-.4 7 0 10" stroke="#3A1F54" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M18 6c.4 3.5.4 7 0 10" stroke="#3A1F54" stroke-width="1.2" stroke-linecap="round"/>
    <!-- bread face -->
    <circle cx="12" cy="14" r="1" fill="#3A1F54"/>
    <circle cx="18" cy="14" r="1" fill="#3A1F54"/>
    <path d="M13 17q2 1.2 4 0" stroke="#3A1F54" stroke-width="1" stroke-linecap="round"/>
    <!-- base -->
    <rect x="6" y="22" width="18" height="3" rx="1.5" fill="#FBBD40" stroke="#3A1F54" stroke-width="1.5"/>
  </g>

  <!-- === right arm waving === -->
  <path d="M128 150c8-4 16-12 20-16" stroke="#3A1F54" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- hand -->
  <circle cx="150" cy="132" r="5" fill="#FBBD40" stroke="#3A1F54" stroke-width="2.5"/>
  <!-- wave lines -->
  <path d="M158 126l4-3" stroke="#3A1F54" stroke-width="2" stroke-linecap="round"/>
  <path d="M160 132l5-1" stroke="#3A1F54" stroke-width="2" stroke-linecap="round"/>
  <path d="M158 138l4 2" stroke="#3A1F54" stroke-width="2" stroke-linecap="round"/>

  <!-- === feet === -->
  <ellipse cx="88" cy="180" rx="10" ry="5" fill="#FBBD40" stroke="#3A1F54" stroke-width="2.5"/>
  <ellipse cx="112" cy="180" rx="10" ry="5" fill="#FBBD40" stroke="#3A1F54" stroke-width="2.5"/>

  <!-- === small planet decoration === -->
  <g transform="translate(162, 80)">
    <circle cx="0" cy="0" r="10" fill="#FBBD40" stroke="#3A1F54" stroke-width="2"/>
    <ellipse cx="0" cy="2" rx="16" ry="4" fill="none" stroke="#3A1F54" stroke-width="1.8"/>
    <circle cx="-3" cy="-2" r="1" fill="#3A1F54"/>
    <circle cx="3" cy="-2" r="1" fill="#3A1F54"/>
    <path d="M-2 2q2 1.5 4 0" stroke="#3A1F54" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- === small moon decoration === -->
  <g transform="translate(22, 75)">
    <path d="M10 0a8 8 0 1 0 0 16 6 6 0 0 1 0-16z" fill="#FBBD40" stroke="#3A1F54" stroke-width="1.5"/>
    <circle cx="6" cy="7" r="0.8" fill="#3A1F54"/>
    <circle cx="9" cy="7" r="0.8" fill="#3A1F54"/>
    <path d="M6.5 9.5q1.5 1 2.5 0" stroke="#3A1F54" stroke-width="0.7" stroke-linecap="round"/>
  </g>
</svg>
